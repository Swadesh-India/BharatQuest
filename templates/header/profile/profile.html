{% load templatetags %}
<div id="profile">
  <div class="profile-super-wrapper">
    <div class="profile-main-wrapper">
      <button
        type="button"
        class="close-profile-btn"
        id="close-profile"
        aria-label="Close profile"
      >
        &times;
      </button>
      <div class="profile-main">
        <div class="profile-image-wrapper">
          <img src="{{ user.profile.avatar.url }}" alt="" />
        </div>
        <div class="profile-detail-wrapper">
          <div class="username-wrapper">
            <i><span style="font-weight: 200">Hey!</span></i> {{ user.fullname|split_with_space|first }}
          </div>
          <div class="email-wrapper">{{ user.email }}</div>
        </div>

        <div class="profile-options-container">
          <ul>
            <li data-redirecturl="{% url 'edit-profile' %}">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#000"
              >
                <path
                  d="M480-240Zm-320 80v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q37 0 73 4.5t72 14.5l-67 68q-20-3-39-5t-39-2q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32h240v80H160Zm400 40v-123l221-220q9-9 20-13t22-4q12 0 23 4.5t20 13.5l37 37q8 9 12.5 20t4.5 22q0 11-4 22.5T903-340L683-120H560Zm300-263-37-37 37 37ZM620-180h38l121-122-18-19-19-18-122 121v38Zm141-141-19-18 37 37-18-19ZM367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47Zm169.5-56.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Z"
                />
              </svg>
              Edit Profile
              <svg
                class="arrow-svg"
                xmlns="http://www.w3.org/2000/svg"
                height="16px"
                viewbox="0 -960 960 960"
                width="24px"
                fill="#000"
              >
                <path d="m321-80-71-71 329-329-329-329 71-71 400 400L321-80Z" />
              </svg>
            </li>
            <li data-redirecturl="{% url 'myblogs' %}">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
              >
                <path
                  d="M240-400h320v-80H240v80Zm0-120h480v-80H240v80Zm0-120h480v-80H240v80ZM80-80v-720q0-33 23.5-56.5T160-880h640q33 0 56.5 23.5T880-800v480q0 33-23.5 56.5T800-240H240L80-80Zm126-240h594v-480H160v525l46-45Zm-46 0v-480 480Z"
                />
              </svg>
              Your Blogs
              <svg
                class="arrow-svg"
                xmlns="http://www.w3.org/2000/svg"
                height="16px"
                viewbox="0 -960 960 960"
                width="24px"
                fill="#000"
              >
                <path d="m321-80-71-71 329-329-329-329 71-71 400 400L321-80Z" />
              </svg>
            </li>
            <li data-redirecturl="#" data-linkedtab="preferences">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#000"
              >
                <path
                  d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"
                />
              </svg>
              Preferences
              <svg
                class="arrow-svg"
                xmlns="http://www.w3.org/2000/svg"
                height="16px"
                viewbox="0 -960 960 960"
                width="24px"
                fill="#000"
              >
                <path d="m321-80-71-71 329-329-329-329 71-71 400 400L321-80Z" />
              </svg>
            </li>
            <li data-redirecturl="#" data-linkedtab="accounts">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#000"
              >
                <path
                  d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Zm0 400Z"
                />
              </svg>
              Account
              <svg
                class="arrow-svg"
                xmlns="http://www.w3.org/2000/svg"
                height="16px"
                viewbox="0 -960 960 960"
                width="24px"
                fill="#000"
              >
                <path d="m321-80-71-71 329-329-329-329 71-71 400 400L321-80Z" />
              </svg>
            </li>
            <hr />
            <li
              data-redirecturl="{% url 'logout' %}"
              style="color: var(--accent-hover)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="var(--accent-hover)"
                style="fill: var(--accent-hover)"
              >
                <path
                  d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"
                />
              </svg>
              Log Out
            </li>
          </ul>
        </div>
      </div>
    </div>

    <div class="profile-aside">
      <button
        type="button"
        class="close-aside-btn"
        id="close-aside"
        aria-label="Close aside"
      >
        &times;
      </button>
      <div class="profile-aside-main" data-linkedtab="preferences">
        {% include "header/profile/preferences.html" %}
      </div>
      <div class="profile-aside-main" data-linkedtab="accounts">
        {% include "header/profile/accounts.html" %}
      </div>
    </div>
  </div>
</div>
